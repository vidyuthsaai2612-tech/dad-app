<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Father's Day, Dad!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card-container">
        <header>
            <h1>❤️ Happy Father's Day, Dad! ❤️</h1>
            <p>To the best dad in the universe.</p>
        </header>

        <div class="photo-frame">
            <img src="https://images.unsplash.com/photo-1542038784456-1ea8e935640e?q=80&w=500" alt="Dad and Me">
        </div>

        <section class="message-section">
            <h2>My Favorite Thing About You:</h2>
            <p id="dynamic-message">Click the button below to see why you're awesome!</p>
            <button id="message-btn">Next Reason ✨</button>
        </section>

        <section class="coupon-section">
            <h2>🎁 Your Father's Day Coupons</h2>
            <div id="coupon-display" class="coupon">Click below to redeem TWO coupons!</div>
            <button id="coupon-btn">Draw a Coupon 🎟️</button>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
